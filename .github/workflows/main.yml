name: VisionX APK Release

on:
  workflow_dispatch:   # Manual trigger from GitHub
  push:
    branches:
      - main           # Main branch pe push hone par bhi trigger

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Set up Java (for Android build)
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3️⃣ Build APK (example using Gradle)
      - name: Build APK
        run: |
          ./gradlew assembleRelease

      # 4️⃣ Force push main branch (if needed)
      - name: Force push
        run: git push -f origin main

      # 5️⃣ Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "VisionX APK v1.0.${{ github.run_number }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6️⃣ Upload APK to Release
      - name: Upload APK
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
